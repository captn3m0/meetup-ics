name: publish
on:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 7:00 AM CEST (5:00 AM UTC)
    - cron: '0 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - name: Install the default version of uv
        id: setup-uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      - name: Build
        env:
          MEETUP_AUTH_ACCESS_TOKEN: ${{ secrets.meetup }}
          STEPS_SETUP_UV_OUTPUTS_UV_VERSION: ${{ steps.setup-uv.outputs.uv-version }}
        run: |
          echo "Installed uv version is ${STEPS_SETUP_UV_OUTPUTS_UV_VERSION}"
          uv run generate.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: "out/"
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
