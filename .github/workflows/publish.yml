name: publish
on:
  push:
    branches:
      - main
  schedule:
    # Runs daily at 7:00 AM CEST (5:00 AM UTC)
    - cron: '0 5 * * *'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install the default version of uv
        id: setup-uv
        uses: astral-sh/setup-uv@v6
      - name: Build
        env:
          MEETUP_AUTH_ACCESS_TOKEN: ${{ secrets.meetup }}
        run: |
          echo "Installed uv version is ${{ steps.setup-uv.outputs.uv-version }}"
          uv run generate.py
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "out/"
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
